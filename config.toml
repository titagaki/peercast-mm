rtmp_port     = 1945
peercast_port = 7154

# ログレベル: "debug" | "info" | "warn" | "error"  (デフォルト: "info")
log_level = "debug"

# 直下に接続できるリレーノード数の上限 (デフォルト: 0 = 無制限)
max_relays = 4

# 全チャンネル合計のリレーノード数の上限 (デフォルト: 0 = 無制限)
max_relays_total = 16

# 直下に接続できる HTTP 視聴者数の上限 (デフォルト: 0 = 無制限)
max_listeners = 4

# 全チャンネル合計の上り帯域上限 kbps (デフォルト: 0 = 無制限)
max_upstream_kbps = 0

# リレーチャンネルの自動切断タイムアウト (分) (デフォルト: 20)
# 視聴・リレーのないリレーチャンネルがこの時間継続すると自動削除される。0 で無効。
channel_cleanup_minutes = 20

# コンテンツリングバッファが保持する秒数 (デフォルト: 0 = 8秒)
# ビットレートから必要なパケット数を自動計算する
# content_buffer_seconds = 8

# 非 localhost からの JSON-RPC アクセスに使う Basic 認証の資格情報
admin_user = "admin"
admin_pass = "hogehoge"

# 複数の YP を定義しておき、起動時に -yp <name> で選択する。
# デフォルト（-yp 省略時）は最初のエントリが使われる。
[[yp]]
name = "0yp"
addr = "pcp://yayaue.me/"

[[yp]]
name = "SP"
addr = "pcp://bayonet.ddo.jp:7146/"

[[yp]]
name = "p@YP"
addr = "pcp://root.p-at.net/"
